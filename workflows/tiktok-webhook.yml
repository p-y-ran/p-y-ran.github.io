name: TikTok Webhook Handler
on:
  repository_dispatch:
    types: [tiktok_event]  # 触发事件类型
  workflow_dispatch:       # 手动触发测试

jobs:
  handle-tiktok-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: 接收 TikTok 回调数据
        env:
          PAYLOAD: ${{ github.event.client_payload.payload }}  # 获取回调数据
        run: |
          # 1. 打印 TikTok 发来的回调数据（方便调试）
          echo "TikTok 回调数据：$PAYLOAD"
          
          # 2. 你的处理逻辑（示例：保存数据到文件）
          echo $PAYLOAD > tiktok-webhook-data.json
          
          # 3. 提交文件到仓库（可选，保存数据）
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add tiktok-webhook-data.json
          git commit -m "Save TikTok webhook data"
          git push

      - name: 发送通知（可选，比如钉钉/微信）
        run: |
          # 示例：发送到钉钉群
          curl 'https://oapi.dingtalk.com/robot/send?access_token=你的钉钉token' \
          -H 'Content-Type: application/json' \
          -d '{"msgtype":"text","text":{"content":"收到 TikTok 回调：${{ github.event.client_payload.payload }}"}}'
